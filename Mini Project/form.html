<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan_5</title>
</head>
<body>
    <h3>Buat Akun</h3>
    <form>
        <label for="Username">Username:</label><br>
        <input 
        type="text" 
        id="username" 
        name="username">
        <br>
        <br>
        <!--  -->
        <label for="password">Password:</label><br>
        <input 
        type="password" 
        id="password" 
        name="password">
        <br>
        <br>
        <!--  -->
        <label for="Jenis Kelamin">Jenis Kelamin</label>
        <br>
        <!--  -->
        <label for="laki-laki">Laki-laki</label>
        <input 
        type="radio" 
        id="laki-laki" 
        name="jenis kelamin" 
        value="laki-laki">
        <!--  -->
        <label for="perempuan">Perempuan</label>
        <input 
        type="radio" 
        id="perempuan" 
        name="jenis kelamin" 
        value="perempuan">
        <br>
        <br>
        <!--  -->
        <label for="Telepon">Telepon:</label>
        <br>
        <input 
        type="tel" 
        id="telepon" 
        name="telepon">
        <br>
        <br>
        <!--  -->
        <label for="Email">Email:</label>
        <br>
        <input 
        type="email"
        id="Email"
        name="Email">
        <br>
        <br>
        <!--  -->
        <label for="Tech skill">Tech skill:</label>
        <br>
        <label for="html">HTML</label>
        <input 
        type="checkbox" 
        id="html" 
        name="tech-skill" 
        value="html">
        <!--  -->
        <label for="css">CSS</label>
        <input 
        type="checkbox" 
        id="css" 
        name="tech-skill" 
        value="css">
        <!--  -->
        <label for="js">JavaScript</label>
        <input 
        type="checkbox" 
        id="js" 
        name="tech-skill" 
        value="js">
        <br>
        <br>
        <!--  -->
        <label for="address">Address:</label>
        <br>
        <textarea 
        id="address" 
        name="address" 
        rows="4" 
        cols="50">
        </textarea>
        <br>
        <button type="submit">Daftar</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
