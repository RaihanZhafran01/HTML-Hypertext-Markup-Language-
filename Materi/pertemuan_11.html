<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Form</title>
</head>
<body>

        Nama depan : <input type="text"><br>

            <h4>Upload File</h4>

        <input type="button" name="Submit" value="Submit">
    </form>

</html>
