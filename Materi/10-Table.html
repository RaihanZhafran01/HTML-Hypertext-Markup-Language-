<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>membuat tabel</h1>
    <h4>tabel Standart</h4>
    <table border="1">
        <!-- tr, baris -->
        <!-- td, data -->
        <!-- th, header -->
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr border="1">
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>

    <h4>Dengan header</h4>
    <table border="1">
        <tr>
            <th>Senin</th>
            <td>10:00</td>
            <td>12:00</td>
            <td>14:00</td>
        </tr>
        <tr>
            <th>Selasa</th>
            <td>10:00</td>
            <td>12:00</td>
            <td>14:00</td>
        </tr>
    </table>
    <br>
    <table border="1">
        <tr>
            <th>Senin</th>
            <th>selasa</th>
        </tr>
        <tr>
            <td>10:00</td>
            <td>12:00</td>
        </tr>
        <tr>
            <td>10:00</td>
            <td>12:00</td>
        </tr>
    </table>
    <br>
    <table border="1">
        <tr>
            <th></th>
            <th>Senin</th>
        </tr>
        <tr>
            <th>10:00</th>
            <td>Berangkat sekolah</td>
        </tr>
        <tr>
            <th>12:00</th>
            <td>Makan siang</td>
        </tr>
    </table>
    <h4>Alokasi kolom</h4>
    <table border="1">
        <tr>
            <th></th>
            <th>Senin</th>
            <th>Selasa</th>
        </tr>
        <tr>
            <th>10:00</th>
            <td>Berangkat sekolah</td>
            <td>Berangkat olahraga</td>
        </tr>
        <tr>
            <th rowspan="2">12:00</th>
            <td colspan="2">Makan siang</td>
        </tr>
        <tr>
            <td colspan="2">Makan siang</td>
        </tr>
    </table>
</body>
</html>
