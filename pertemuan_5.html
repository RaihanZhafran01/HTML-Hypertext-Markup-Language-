<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strong, Emphasis, dan Blockquote</title>
</head>
<body>
    <!-- Strong -->
     <p>
        <strong>Perhatian</strong> : Jangan buang sampah sembarangan.
     </p>
     <!-- Blockquote -->
     <blockquote>
        Mensana incorporesano, Men ke sana, Women ke sono.
     </blockquote>

      <!-- Emphasis -->
      <!-- Quote -->
      <p>Ini adalah tempat <em>nongrong</em>, bukan tempat untuk <strong>berantem</strong>. Bossku bilang, <q>Selalu jaga kesehatan</q>.</p>

</body>
</html>
